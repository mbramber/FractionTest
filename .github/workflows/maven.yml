name: Java CI with Maven

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Brueche

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: JDK 17 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Bauen mit Maven
        run: mvn -B package

      - name: Test Report erstellen
        uses: dorny/test-reporter@v2
        if: always() # Läuft auch, wenn Tests fehlschlagen
        with:
          name: Maven Tests
          # Pfad muss den Unterordner enthalten
          path: Brueche/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: JAR-Datei hochladen
        uses: actions/upload-artifact@v4
        with:
          name: fraction-jar
          path: Brueche/target/*.jar