name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (Skip Tests)
        # Wir müssen Maven sagen, wo die pom.xml liegt
        run: mvn -B package -DskipTests=true --file Brueche/pom.xml

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: fraction-jar
          # Pfad angepasst auf den Unterordner
          path: Brueche/target/*.jar

      - name: Build with Maven (With Tests)
        # Zweiter Durchlauf für die Test-Dateien
        run: mvn -B package --file Brueche/pom.xml

      - name: Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Maven Tests
          # Pfad angepasst auf den Unterordner
          path: Brueche/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true