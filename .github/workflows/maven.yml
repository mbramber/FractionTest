name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Brueche

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Erst JAR bauen OHNE Tests
      - name: Build JAR without tests
        run: mvn -B package -DskipTests=true

      # JAR immer hochladen
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: fraction-jar
          path: Brueche/target/*.jar

      # Tests separat ausführen
      - name: Run Tests
        run: mvn test
        continue-on-error: true

      # Testergebnisse anzeigen
      - name: Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Maven Tests
          path: Brueche/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true